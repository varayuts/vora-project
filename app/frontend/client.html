<!doctype html>
<html lang="th">
<meta charset="utf-8" />
<title>VORA Realtime STT + LLM (Manual LLM + Long Context)</title>
<style>
  :root{
    --bg:#0b0f14; --fg:#e6edf3; --muted:#9fb0c0; --card:#0e1318; --btn:#161b22; --btnh:#1f2630; --accent:#4cc2ff;
  }
  *{ box-sizing:border-box }
  body{ font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto; margin:24px; background:var(--bg); color:var(--fg); }
  .row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap }
  input,button{ padding:10px 12px; border-radius:12px; border:1px solid #2d333b; background:var(--btn); color:var(--fg) }
  button{ cursor:pointer } button:hover{ background:var(--btnh) }
  .pill{ padding:4px 8px; border-radius:999px; background:#0c1622; border:1px solid #1b2633; color:var(--muted); font-size:12px }
  .card{ background:var(--card); border:1px solid #1b2633; border-radius:14px; padding:14px }
  .accent{ color:var(--accent) }
  #status{ margin-left:8px; color:var(--muted) }
  h2{ margin:0 0 12px 0 } h3{ margin:0 0 8px 0; color:#b9c6d3 }
  .grid{ display:grid; grid-template-columns:1fr 1.2fr; gap:12px }
  pre{ margin:0; white-space:pre-wrap; word-break:break-word }
  #chatWrap{ display:flex; flex-direction:column; height:60vh; gap:10px }
  #chat{ flex:1; overflow:auto; padding-right:4px }
  .msg{ max-width:85%; margin:8px 0; padding:10px 12px; border-radius:14px; background:#0f1720; border:1px solid #1b2633; line-height:1.5 }
  .user { align-self:flex-end; background:#0f1a26; border-color:#16324a }
  .agent{ align-self:center; background:#111522; border-color:#223055; opacity:.95 }
  .asst { align-self:flex-start; background:#0f1a15; border-color:#173425 }
  .tag{ font-size:12px; opacity:.85; margin-bottom:6px }
  .tag .u{ color:#9ccaff } .tag .a{ color:#9fe3b4 } .tag .g{ color:#8bb1ff }
  .spinner{ width:14px; height:14px; border:2px solid #2a3340; border-top-color:#8ab9ff; border-radius:50%; display:inline-block; animation:spin .9s linear infinite; vertical-align:middle; margin-right:6px }
</style>

<div class="row">
  <h2>VORA <span class="accent">Realtime STT</span> + LLM</h2>
  <span id="status" class="pill">idle</span>
  <span id="sttmeta" class="pill"></span>
</div>

<div class="row">
  <label>API</label>
  <input id="api" size="28" value="http://localhost:8000">
  <label>WS</label>
  <input id="ws" size="42" value="ws://localhost:8000/ws/stt?lang=th">
  <span class="pill" id="sidpill"></span>
</div>

<div class="card" style="margin-bottom:12px; display:flex; gap:12px; flex-wrap:wrap; align-items:center">
  <button id="start">Start</button>
  <button id="stop">Stop</button>
  <button id="restart">Restart</button>
  <button id="reset">Reset</button>

  <div class="mode">
    <span class="pill">โหมดคำตอบ:</span>
    <label class="pill"><input type="radio" name="mode" value="never" checked> ตอบเร็ว (ไม่ค้นเว็บ)</label>
    <label class="pill"><input type="radio" name="mode" value="always"> ค้นเว็บเพิ่ม (ช้าลง)</label>
  </div>

  <div class="mode">
    <span class="pill">ช่วงตัดคำ (STT):</span>
    <label class="pill"><input type="radio" name="chunk" value="short"> สั้น</label>
    <label class="pill"><input type="radio" name="chunk" value="medium" checked> กลาง</label>
    <label class="pill"><input type="radio" name="chunk" value="long"> ยาว</label>
  </div>

  <!-- Auto LLM = manual เท่านั้น -->
  <!-- TTS ปิด auto ไว้ก่อนได้ (ตอน backend 500) -->
  <label class="pill"><input id="autoTTS" type="checkbox"> Auto TTS</label>
  <button id="btnSpeak">🔊 Speak</button>
  <span id="ttsStatus" class="pill">TTS idle</span>
  <audio id="ttsAudio" controls style="width:320px; max-width:100%"></audio>

  <button id="askllm">Ask LLM now</button>
  <button id="clear">Clear chat</button>
  <span class="pill">mic: echoCancellation / noiseSuppression / autoGainControl</span>
</div>

<div class="grid">
  <div class="card">
    <h3>Transcript (live)</h3>
    <pre id="text"></pre>
  </div>
  <div class="card" id="chatWrap">
    <h3 style="margin-bottom:6px">Chat</h3>
    <div id="chat"></div>
  </div>
</div>

<script>
(() => {
  // ---- session id ----
  const SID = (() => {
    try {
      const K = 'vora_sid';
      let v = localStorage.getItem(K);
      if (!v) { v = crypto.randomUUID(); localStorage.setItem(K, v); }
      return v;
    } catch { return Math.random().toString(36).slice(2); }
  })();
  document.getElementById('sidpill').textContent = 'sid: ' + SID.slice(0,8) + '…';

  const apiInput   = document.getElementById('api');
  const wsInput    = document.getElementById('ws');
  const btnStart   = document.getElementById('start');
  const btnStop    = document.getElementById('stop');
  const btnRestart = document.getElementById('restart');
  const btnReset   = document.getElementById('reset');
  const btnAsk     = document.getElementById('askllm');
  const btnClear   = document.getElementById('clear');

  const btnSpeak   = document.getElementById('btnSpeak');
  const autoTTS    = document.getElementById('autoTTS');
  const ttsStatus  = document.getElementById('ttsStatus');
  const ttsAudio   = document.getElementById('ttsAudio');

  const statusEl   = document.getElementById('status');
  const sttMetaEl  = document.getElementById('sttmeta');
  const textEl     = document.getElementById('text');
  const chat       = document.getElementById('chat');

  const modeEls    = Array.from(document.querySelectorAll('input[name="mode"]'));

  let ws, rec, stream;
  let greeted = false;
  let lastLLMText = "";
  let ctxText = "";  // buffer เก็บหลาย ๆ final ให้เป็น context ยาว

  function getChunk(){
    const els = Array.from(document.querySelectorAll('input[name="chunk"]'));
    const el = els.find(x => x.checked);
    return el ? el.value : 'medium';
  }
  function getMode(){
    const el = modeEls.find(x => x.checked);
    return el ? el.value : "never";
  }
  function setStatus(s){ statusEl.textContent = s; console.log('[status]', s); }
  function clearText(){ textEl.textContent = ''; }
  function scrollChat(){ chat.scrollTop = chat.scrollHeight; }

  function addMsg(role, title, text, pending=false){
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const tag = document.createElement('div');
    tag.className = 'tag';
    if(role==='user') tag.innerHTML = '<span class="u">คุณ</span>';
    else if(role==='asst') tag.innerHTML = '<span class="a">ผู้ช่วย</span>';
    else tag.innerHTML = '<span class="g">Agent</span>';
    if(title){ const b = document.createElement('b'); b.textContent = ' ' + title; tag.appendChild(b); }
    const content = document.createElement('div'); content.className = 'text'; content.textContent = text || '';
    wrap.appendChild(tag);
    if(pending){
      const sp = document.createElement('span'); sp.className = 'spinner'; tag.prepend(sp);
    }
    wrap.appendChild(content);
    chat.appendChild(wrap); scrollChat();
    return {wrap, content, tag};
  }
  function setPendingDone(ref, text){
    const sp = ref.tag.querySelector('.spinner'); if(sp) sp.remove();
    ref.content.textContent = text || ''; scrollChat();
  }

  // ===== TTS helper (ใช้ทีหลัง ตอน backend พร้อม) =====
  async function speakText(text) {
    if (!text || !text.trim()) return;
    const api = apiInput.value.trim().replace(/\/+$/,'');
    const endpoint = api + '/api/tts/speak'; // ถ้า backend ใช้ path อื่นค่อยเปลี่ยน
    ttsStatus.textContent = 'TTS: synthesizing…';
    try {
      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, sample_rate_hz: 22050, format: 'wav' })
      });
      if (!resp.ok) {
        const err = await resp.text().catch(()=>String(resp.status));
        throw new Error(`HTTP ${resp.status} – ${err}`);
      }
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      ttsAudio.src = url;

      try { await ttsAudio.play(); }
      catch {}

      ttsStatus.textContent = 'TTS: playing ✓';
    } catch (e) {
      console.error(e);
      ttsStatus.textContent = 'TTS error';
      alert('TTS error: ' + (e?.message || e));
    }
  }

  function sendToLLM(text, lang) {
    const t = (text || '').trim();
    if (!t) return;
    // กันยิงซ้ำข้อความเดิมเป๊ะ
    if (t === lastLLMText) {
      console.log('[LLM] skip duplicate:', t);
      return;
    }
    lastLLMText = t;
    runPipeline(t, lang || 'th');
  }

  async function openWS() {
    return new Promise((resolve, reject) => {
      try {
        const base = wsInput.value.trim();
        let url;
        try { url = new URL(base); } catch { url = new URL(base, window.location.href); }
        url.searchParams.set('sid', SID);
        url.searchParams.set('chunk', getChunk());
        ws = new WebSocket(url.toString());
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => { setStatus('connected'); resolve(); };
        ws.onclose = () => setStatus('disconnected');
        ws.onerror = (e) => { console.error(e); setStatus('ws error'); reject(e); };

        // ========= STT events → UI + เก็บ context เท่านั้น =========
        ws.onmessage = (ev) => {
          try {
            const m = JSON.parse(ev.data);
            if (!m || typeof m !== 'object') return;

            if (m.type && (m.type === 'partial' || m.type === 'stable' || m.type === 'final')) {
              const lang = m.lang || 'auto';
              const tag  = m.type.toUpperCase();
              if (sttMetaEl) sttMetaEl.textContent = `STT: ${tag} [${lang}]`;
            }

            // อัปเดต transcript live
            if (m.type === 'partial' || m.type === 'stable' || m.type === 'final') {
              if (m.text != null) textEl.textContent = m.text;
            }

            // final → ต่อเข้า buffer ให้กลายเป็น context ยาว
            if (m.type === 'final') {
              const utt = (m.text || '').trim();
              if (utt) {
                ctxText = (ctxText + ' ' + utt).trim();
                console.log('[CTX]', ctxText);
              }
            }

            if (m.type === 'info' && m.msg) {
              console.log('[stt-info]', m.msg);
            }
            if (m.type === 'error' && m.msg) {
              console.warn('[stt-error]', m.msg);
              setStatus('server: ' + m.msg);
            }
          } catch (e) {
            console.error('ws parse error', e, ev.data);
            textEl.textContent = String(ev.data || '');
          }
        };
        // ========= /ws.onmessage =========

      } catch (e) { reject(e); }
    });
  }

  async function startRecording() {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }
    });
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/ogg;codecs=opus';
    rec = new MediaRecorder(stream, { mimeType: mime, audioBitsPerSecond: 32000 });
    rec.ondataavailable = async (ev) => {
      if (ev.data && ev.data.size > 0 && ws && ws.readyState === 1) {
        ws.send(await ev.data.arrayBuffer());
      }
    };
    rec.onstart = () => setStatus('recording…');
    rec.start(250);
  }

  async function stopOnly(){
    if (rec && rec.state !== 'inactive') rec.stop();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ws && ws.readyState === 1) ws.send('STOP');
    setStatus('stopped (ws open)');
  }
  async function stopAll(closeWS=false){
    if (rec && rec.state !== 'inactive') rec.stop();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ws && ws.readyState === 1 && closeWS) { ws.send('CLOSE'); ws.close(); }
  }

  // ========== LLM Pipeline ==========
  async function runPipeline(text, langHint){
    const api = apiInput.value.trim().replace(/\/+$/,'');
    const mode = getMode(); // "never" หรือ "always"

    const pendingAgent = addMsg('agent', 'กำลังกำจัด noise/ทำความเข้าใจ…', '', true);
    const pendingAsst  = addMsg('asst', 'กำลังคิด…', '', true);

    try {
      const r = await fetch(api + "/agent/answer", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          text,
          session_id: SID,
          lang_hint: langHint || "th",
          topk: 3,
          search_when: mode
        })
      });
      if (!r.ok) {
        setPendingDone(pendingAgent, "Agent error: HTTP " + r.status);
        setPendingDone(pendingAsst,  "Agent error: HTTP " + r.status);
        return;
      }
      const j = await r.json();

      if (j && j.refine) {
        const ref = j.refine;
        const lines = [
          `🎯 ${ref.clean_text}`,
          `intent=${ref.intent}, lang=${ref.language}`,
          mode === 'never' ? 'โหมด: ตอบเร็ว (ไม่ค้นเว็บ)' : 'โหมด: ค้นเว็บเพิ่ม'
        ];
        setPendingDone(pendingAgent, lines.join('\n'));
      } else {
        setPendingDone(pendingAgent, "ไม่มีข้อมูล refine");
      }

      let txt = j.answer || "(empty response)";
      if (Array.isArray(j.sources) && j.sources.length > 0) {
        const links = j.sources.map(s => `• ${s.title} — ${s.url}`).join('\n');
        txt += `\n\nแหล่งอ้างอิง:\n${links}`;
      }
      setPendingDone(pendingAsst, txt);

      if (autoTTS.checked) {
        setTimeout(() => speakText(txt), 100);
      }
    } catch (e) {
      const msg = "Agent error: " + (e?.message || e);
      setPendingDone(pendingAgent, msg);
      setPendingDone(pendingAsst,  msg);
    }
  }

  // ----- Buttons -----
  btnStart.onclick = async () => {
    try {
      await stopAll(true);
      clearText();
      sttMetaEl.textContent = '';
      lastLLMText = "";
      ctxText = "";  // เริ่ม buffer ใหม่ทุกครั้งที่ Start
      await openWS();
      await startRecording();
      if (!greeted) {
        addMsg('asst', null, 'เริ่มฟังแล้วนะครับ พูดได้เลย');
        greeted = true;
      }
    } catch (e) { setStatus('start error: ' + (e?.message || e)); }
  };
  btnStop.onclick = async () => { await stopOnly(); };
  btnRestart.onclick = async () => {
    if (ws && ws.readyState === 1) ws.send('RESET');
    await stopOnly();
    await startRecording();
    setStatus('restarted & recording');
  };
  btnReset.onclick = async () => {
    await stopAll(true);
    clearText();
    sttMetaEl.textContent = '';
    setStatus('idle');
    greeted = false;
    lastLLMText = "";
    ctxText = "";  // reset context ด้วย
  };
  btnClear.onclick = () => { chat.innerHTML = ''; };

  // ปุ่ม Ask LLM = manual + ส่ง context ยาวจากหลาย final
  btnAsk.onclick = () => {
    // ใช้ ctxText ทั้งก้อนก่อน ถ้าไม่มีค่อย fallback live text
    const p = (ctxText || textEl.textContent || '').trim();
    if (!p) return;

    addMsg('user', null, p);
    sendToLLM(p, 'th');

    // ปิด chapter นี้ แล้วเริ่มสะสม context ใหม่รอบถัดไป
    ctxText = "";
  };

  btnSpeak.onclick = () => {
    const lastAsst = [...chat.querySelectorAll('.msg.asst .text')].pop();
    const asstText = lastAsst?.textContent?.trim();
    if (asstText) return speakText(asstText);
    const fromLive = textEl?.textContent || '';
    return speakText(fromLive);
  };
})();
</script>
</html>
